name: Feature Request
description: Suggest an improvement to the skill or output format
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Have an idea to improve session handoffs? We'd love to hear it."

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's missing or frustrating about the current handoff output?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the improved output or behavior look like?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds?
